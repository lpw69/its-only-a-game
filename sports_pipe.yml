name: It's Only a Game - Sports Pipe
on:
  schedule:
    - cron: "11 6 * * *"
    - cron: "37 6 * * *"
    - cron: "13 7 * * *"
    - cron: "47 7 * * *"
    - cron: "23 8 * * *"
    - cron: "51 8 * * *"
    - cron: "19 9 * * *"
    - cron: "43 9 * * *"
    - cron: "17 10 * * *"
    - cron: "53 10 * * *"
    - cron: "29 11 * * *"
    - cron: "57 11 * * *"
    - cron: "21 12 * * *"
    - cron: "47 12 * * *"
    - cron: "13 13 * * *"
    - cron: "39 13 * * *"
    - cron: "21 14 * * *"
    - cron: "53 14 * * *"
    - cron: "27 15 * * *"
    - cron: "49 15 * * *"
    - cron: "33 16 * * *"
    - cron: "57 17 * * *"
    - cron: "41 19 * * *"
    - cron: "23 21 * * *"
  workflow_dispatch:
jobs:
  run-sports-pipe:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install anthropic requests
      - name: Run sports pipe
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          APIFY_API_TOKEN: ${{ secrets.APIFY_API_TOKEN }}
          TYPEFULLY_API_KEY: ${{ secrets.TYPEFULLY_API_KEY }}
          TYPEFULLY_GAME_SOCIAL_SET_ID: ${{ secrets.TYPEFULLY_GAME_SOCIAL_SET_ID }}
        run: python sports_pipe.py
