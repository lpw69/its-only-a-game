name: It's Only a Game - Sports Pipe
on:
  schedule:
    - cron: "11 7 * * *"
    - cron: "37 8 * * *"
    - cron: "13 10 * * *"
    - cron: "47 11 * * *"
    - cron: "23 13 * * *"
    - cron: "51 14 * * *"
    - cron: "19 16 * * *"
    - cron: "43 17 * * *"
    - cron: "29 19 * * *"
    - cron: "57 21 * * *"
  workflow_dispatch:
jobs:
  run-sports-pipe:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install anthropic requests
      - name: Run sports pipe
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          APIFY_API_TOKEN: ${{ secrets.APIFY_API_TOKEN }}
          TYPEFULLY_API_KEY: ${{ secrets.TYPEFULLY_API_KEY }}
          TYPEFULLY_GAME_SOCIAL_SET_ID: ${{ secrets.TYPEFULLY_GAME_SOCIAL_SET_ID }}
        run: python sports_pipe.py
